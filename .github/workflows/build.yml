name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev wget \
          openjdk-11-jdk-headless
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer
    
    - name: Build
      run: |
        # Создаем buildozer.spec с правильными настройками
        echo '[app]' > buildozer.spec
        echo 'title = Вагонник' >> buildozer.spec
        echo 'package.name = wagonnik' >> buildozer.spec
        echo 'package.domain = org.denis' >> buildozer.spec
        echo 'version = 1.0.0' >> buildozer.spec
        echo 'requirements = python3,kivy' >> buildozer.spec
        echo 'source.dir = .' >> buildozer.spec
        echo 'source.include_exts = py,png,jpg,kv,atlas,json' >> buildozer.spec
        echo 'orientation = portrait' >> buildozer.spec
        echo 'fullscreen = 0' >> buildozer.spec
        echo 'android.api = 31' >> buildozer.spec
        echo 'android.minapi = 21' >> buildozer.spec
        echo 'android.sdk = 33' >> buildozer.spec
        echo 'android.ndk = 23c' >> buildozer.spec
        echo 'android.archs = armeabi-v7a' >> buildozer.spec
        echo 'android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE' >> buildozer.spec
        echo '' >> buildozer.spec
        echo '[buildozer]' >> buildozer.spec
        echo 'log_level = 2' >> buildozer.spec
        echo 'warn_on_root = 1' >> buildozer.spec
        echo 'android.accept_sdk_license = True' >> buildozer.spec
        
        # Сборка
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: Вагонник-APK
        path: bin/*.apk
        retention-days: 30
