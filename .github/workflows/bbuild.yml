name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev wget
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer
    
    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Принимаем все лицензии автоматически
        yes | sdkmanager --licenses || true
        
        # Устанавливаем необходимые компоненты
        sdkmanager "platform-tools" "platforms;android-31" "build-tools;30.0.3" || true
        sdkmanager "platforms;android-33" "build-tools;33.0.0" || true
      env:
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
    
    - name: Build
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = Вагонник
package.name = wagonnik
package.domain = org.denis
version = 1.0.0
requirements = python3,kivy
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,json
orientation = portrait
fullscreen = 0

android.api = 31
android.minapi = 21
android.sdk = 33
android.ndk = 23c
android.archs = armeabi-v7a
android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE

[buildozer]
log_level = 2
warn_on_root = 1
android.accept_sdk_license = True
EOF
        
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: Вагонник-APK
        path: bin/*.apk
        retention-days: 30
